name: Run LIX Analog Guidance

on:
  workflow_dispatch:
    inputs:
      cycle:
        description: "RRFS cycle to run: latest or YYYYMMDDHH"
        required: false
        default: "latest"
      fhr_end:
        description: "Last forecast hour"
        required: false
        default: "60"
  schedule:
    # Runs at 4 AM, 10 AM, 4 PM, and 10 PM Central during daylight time.
    # GitHub Actions cron uses UTC, so CDT = UTC-5.
    - cron: "0 3,9,15,21 * * *"

concurrency:
  group: lix-analog-guidance
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  run-guidance:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libeccodes-dev \
            libeccodes-tools \
            libproj-dev \
            proj-bin \
            proj-data \
            libgeos-dev

      - name: Download LIX analog runner/data bundle
        run: |
          curl -L \
            -o lix_github_actions_full_bundle.zip \
            "https://github.com/JacZerin24/lix-analog-guidance-web/releases/download/data-v1/lix_github_actions_full_bundle.zip"
          unzip -q lix_github_actions_full_bundle.zip -d runner
          echo "Bundle contents:"
          find runner -maxdepth 3 -type f | sort | head -200

      - name: Install Python requirements
        working-directory: runner
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run LIX analog cycle
        working-directory: runner
        env:
          CYCLE: ${{ github.event.inputs.cycle || 'latest' }}
          FHR_END: ${{ github.event.inputs.fhr_end || '60' }}
        run: |
          python scripts/06_run_lix_analog_cycle.py \
            --library data/lix_gridpoint_analog_library.npz \
            --model rrfs \
            --cycle "$CYCLE" \
            --fhr-start 0 \
            --fhr-end "$FHR_END" \
            --fhr-step 6 \
            --latest-require-all 1 \
            --download-dir model_cache \
            --output-root site \
            --county-shapefile data/shapefiles/counties/c_16ap26.shp \
            --cwa-shapefile data/shapefiles/cwa/w_16ap26.shp \
            --missing-policy mean \
            --save-analogs 1 \
            --analog-top-n 5 \
            --run-web-export 1 \
            --verbose 1 \
            --child-verbose 1

      - name: Build analog report assets
        working-directory: runner
        run: |
          python scripts/08_build_analog_report_assets.py \
            --web-root site \
            --reports-tornado data/reports/lix_tornadoes_all_1974_2023.csv \
            --reports-hail data/reports/lix_hail.csv \
            --reports-wind data/reports/lix_wind.csv \
            --county-shapefile data/shapefiles/counties/c_16ap26.shp \
            --cwa-shapefile data/shapefiles/cwa/w_16ap26.shp \
            --force 1 \
            --verbose 1

      - name: Attach analog JSON paths to web manifest
        working-directory: runner
        run: |
          python - <<'PY'
          import json
          import re
          from pathlib import Path
          from datetime import datetime, timezone

          root = Path("site")
          latest_path = root / "web_latest.json"

          if not latest_path.exists():
              raise FileNotFoundError(f"Missing {latest_path}")

          data = json.loads(latest_path.read_text(encoding="utf-8"))

          analog_files = sorted(root.glob("cycles/*/netcdf/*_analogs.json"))
          print(f"Found {len(analog_files)} analog JSON files")

          def rel(path):
              return path.relative_to(root).as_posix()

          def valid_token(value):
              if not value:
                  return ""
              s = str(value)
              try:
                  dt = datetime.fromisoformat(s.replace("Z", "+00:00")).astimezone(timezone.utc)
                  return dt.strftime("%Y%m%d_%HZ")
              except Exception:
                  m = re.search(r"(\d{8}_\d{2}Z)", s)
                  return m.group(1) if m else ""

          analog_by_key = {}
          for path in analog_files:
              name = path.name
              fhr_match = re.search(r"_f(\d{3})_", name)
              valid_match = re.search(r"_valid_(\d{8}_\d{2}Z)_analogs\.json$", name)
              cycle_match = re.search(r"_(\d{10})_f\d{3}_", name)

              if not fhr_match or not valid_match:
                  continue

              fhr = int(fhr_match.group(1))
              vtok = valid_match.group(1)
              cycle = cycle_match.group(1) if cycle_match else ""

              analog_by_key[(cycle, fhr, vtok)] = rel(path)
              analog_by_key[("", fhr, vtok)] = rel(path)

          def attach_to_product(product):
              if not isinstance(product, dict):
                  return product

              if product.get("analog_json"):
                  return product

              cycle = str(product.get("cycle") or data.get("cycle") or "")
              fhr = product.get("forecast_hour")
              vtok = valid_token(product.get("valid_time"))

              try:
                  fhr_int = int(fhr)
              except Exception:
                  fhr_int = None

              candidate = None
              if fhr_int is not None and vtok:
                  candidate = (
                      analog_by_key.get((cycle, fhr_int, vtok)) or
                      analog_by_key.get(("", fhr_int, vtok))
                  )

              if candidate:
                  product["analog_json"] = candidate
                  product["analog_json_url"] = ""
                  product["analog_lookup_fields"] = ["grid_i", "grid_j"]
                  product["analog_status"] = "available"
              else:
                  product["analog_status"] = product.get("analog_status") or "missing"

              return product

          if isinstance(data.get("products"), list):
              data["products"] = [attach_to_product(p) for p in data["products"]]

          if isinstance(data.get("entries"), list):
              data["entries"] = [attach_to_product(p) for p in data["entries"]]

          if isinstance(data.get("days"), list):
              for day in data["days"]:
                  if isinstance(day, dict) and isinstance(day.get("products"), list):
                      day["products"] = [attach_to_product(p) for p in day["products"]]

          latest_path.write_text(json.dumps(data, indent=2, sort_keys=True), encoding="utf-8")
          print("Attached analog_json paths to web_latest.json")

          count = 0
          for day in data.get("days", []):
              for product in day.get("products", []):
                  if product.get("analog_json"):
                      count += 1
          print(f"Products with analog_json: {count}")
          PY

      - name: Add webpage and quick diagnostics
        working-directory: runner
        run: |
          cp ../index.html site/index.html
          python - <<'PY'
          import json
          from pathlib import Path

          p = Path('site/web_latest.json')
          d = json.loads(p.read_text())

          print('Published cycle:', d.get('cycle'), d.get('cycle_label'), d.get('created_utc'))
          print('Products:', d.get('product_count'))
          print('Report assets:', d.get('analog_report_assets_available'))

          analog_count = 0
          missing_count = 0
          for day in d.get('days', []):
              for product in day.get('products', []):
                  if product.get('analog_json'):
                      analog_count += 1
                  else:
                      missing_count += 1

          print('Products with analog_json:', analog_count)
          print('Products missing analog_json:', missing_count)

          if analog_count == 0:
              raise SystemExit('No products have analog_json paths. Top analogs would not load.')
          PY
          find site -type f | wc -l
          du -sh site

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: runner/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
